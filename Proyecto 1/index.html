      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

      crossorigin="anonymous"
    ></script>
    
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">Taller Mecánico</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">

    <section class="bg-primary text-white text-center p-5">
      <h1 id="titulo">Bienvenido a Taller Mecánica Automotriz</h1>
      <p>Servicio profesional y garantizado</p>
      <button id="animar" class="btn btn-warning">Animar Título</button>
    </section>

    <script>
      document.getElementById("animar").addEventListener("click", function () {
        let titulo = document.getElementById("titulo");
        titulo.style.transition = "transform 0.5s";
        titulo.style.transform = "scale(1.2)";
        setTimeout(() => {
          titulo.style.transform = "scale(1)";
        }, 500);
      });
    </script>
